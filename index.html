<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Emby Tag Manager</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#ffffff;--bg2:#f5f5f4;--bg3:#eeede8;
  --text:#1a1a18;--text2:#666660;--text3:#999990;
  --border:rgba(0,0,0,.13);--border2:rgba(0,0,0,.22);
  --info-bg:#e6f1fb;--info-text:#185fa5;--info-border:rgba(24,95,165,.25);
  --success-bg:#eaf3de;--success-text:#3b6d11;--success-border:rgba(59,109,17,.25);
  --warn-bg:#faeeda;--warn-text:#854f0b;--warn-border:rgba(133,79,11,.25);
  --danger-bg:#fcebeb;--danger-text:#a32d2d;--danger-border:rgba(163,45,45,.25);
  --radius:8px;--radius-lg:12px;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#1e1e1c;--bg2:#2a2a27;--bg3:#323230;
    --text:#e8e8e4;--text2:#aaa9a2;--text3:#77776e;
    --border:rgba(255,255,255,.12);--border2:rgba(255,255,255,.22);
    --info-bg:#0c2a45;--info-text:#7ab8f0;--info-border:rgba(122,184,240,.2);
    --success-bg:#162910;--success-text:#8fca5a;--success-border:rgba(143,202,90,.2);
    --warn-bg:#2e1f05;--warn-text:#f0b050;--warn-border:rgba(240,176,80,.2);
    --danger-bg:#2e0f0f;--danger-text:#e88080;--danger-border:rgba(232,128,128,.2);
  }
}
body{font-family:system-ui,-apple-system,sans-serif;font-size:15px;color:var(--text);background:var(--bg3);min-height:100vh}
input,select,button,textarea{font-family:inherit;font-size:14px}
input[type=text]{height:36px;padding:0 10px;border:0.5px solid var(--border2);border-radius:var(--radius);background:var(--bg);color:var(--text);width:100%;outline:none}
input[type=text]:focus{border-color:var(--info-text);box-shadow:0 0 0 2px var(--info-bg)}
button{height:34px;padding:0 14px;border:0.5px solid var(--border2);border-radius:var(--radius);background:transparent;color:var(--text);cursor:pointer;white-space:nowrap;transition:background .12s}
button:hover{background:var(--bg2)}
button:active{transform:scale(.98)}
button.primary{background:var(--text);color:var(--bg);border-color:transparent}
button.primary:hover{opacity:.85}
button.success{border-color:var(--success-border);color:var(--success-text);background:var(--success-bg)}
button.success:hover{opacity:.85}
button.danger{border-color:var(--danger-border);color:var(--danger-text)}
button.danger:hover{background:var(--danger-bg)}
button:disabled{opacity:.4;cursor:default;pointer-events:none}
.card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:1rem 1.25rem}
.badge{display:inline-flex;align-items:center;font-size:12px;padding:3px 9px;border-radius:999px;font-weight:500}
.badge.info{background:var(--info-bg);color:var(--info-text)}
.badge.success{background:var(--success-bg);color:var(--success-text)}
.badge.warning{background:var(--warn-bg);color:var(--warn-text)}
.badge.danger{background:var(--danger-bg);color:var(--danger-text)}
.section-label{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.07em;color:var(--text2);margin-bottom:6px}
.tag-chip{display:inline-flex;align-items:center;gap:4px;font-size:12px;padding:3px 8px;border-radius:999px;background:var(--bg2);border:0.5px solid var(--border);color:var(--text2)}
.tag-chip.pending{background:var(--info-bg);border-color:var(--info-border);color:var(--info-text)}
.tag-chip .rm{cursor:pointer;font-size:10px;opacity:.6;margin-left:2px}
.tag-chip .rm:hover{opacity:1;color:var(--danger-text)}
#app{max-width:1200px;margin:0 auto;padding:1.5rem 1rem}
.row{display:flex;align-items:center;gap:8px}
.suggest-wrap{position:relative}
.tag-suggest{position:absolute;z-index:100;background:var(--bg);border:0.5px solid var(--border2);border-radius:var(--radius);max-height:160px;overflow-y:auto;min-width:200px;box-shadow:0 4px 16px rgba(0,0,0,.15);top:38px;left:0}
.tag-suggest div{padding:7px 10px;cursor:pointer;font-size:13px;color:var(--text)}
.tag-suggest div:hover{background:var(--bg2)}
.movie-row{border-bottom:0.5px solid var(--border);padding:10px 0;display:grid;grid-template-columns:48px 1fr auto;gap:12px;align-items:start}
.movie-row:last-child{border-bottom:none}
.thumb{width:40px;height:60px;border-radius:4px;object-fit:cover;background:var(--bg2);border:0.5px solid var(--border);flex-shrink:0;display:block}
.thumb-sm{width:32px;height:48px;border-radius:3px;object-fit:cover;background:var(--bg2);border:0.5px solid var(--border);flex-shrink:0}
.thumb-placeholder{width:40px;height:60px;border-radius:4px;background:var(--bg2);border:0.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;color:var(--text3)}
.log-line{font-size:12px;font-family:monospace;padding:3px 0;border-bottom:0.5px solid var(--border)}
.log-line.ok{color:var(--success-text)}
.log-line.err{color:var(--danger-text)}
.log-line.skip{color:var(--text3)}
.log-line.info{color:var(--info-text)}
.stats{display:flex;gap:10px;flex-wrap:wrap;margin:8px 0}
.stat-card{flex:1;min-width:80px;background:var(--bg2);border-radius:var(--radius);padding:10px;text-align:center}
.stat-card .val{font-size:22px;font-weight:500}
.stat-card .lbl{font-size:11px;color:var(--text2);margin-top:2px}
.nav-bar{display:flex;gap:2px;border-bottom:0.5px solid var(--border);margin-bottom:1.5rem}
.nav-tab{padding:9px 16px;font-size:14px;cursor:pointer;border-bottom:2px solid transparent;color:var(--text2)}
.nav-tab.active{color:var(--text);border-bottom-color:var(--text)}
.sub-tab-bar{display:flex;gap:2px;border-bottom:0.5px solid var(--border);margin-bottom:1rem}
.sub-tab{padding:8px 14px;font-size:13px;cursor:pointer;border-bottom:2px solid transparent;color:var(--text2)}
.sub-tab.active{color:var(--text);border-bottom-color:var(--text)}
.progress{height:4px;background:var(--bg2);border-radius:2px;overflow:hidden;margin:8px 0}
.progress-inner{height:100%;background:var(--info-text);transition:width .3s}
.empty-state{text-align:center;padding:2.5rem 0;color:var(--text2)}
.splash{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:12px;color:var(--text2)}
.splash h2{font-size:18px;font-weight:500;color:var(--text)}
#toast{position:fixed;bottom:1.5rem;right:1.5rem;background:var(--bg);border:0.5px solid var(--border2);border-radius:var(--radius);padding:10px 16px;font-size:13px;box-shadow:0 4px 16px rgba(0,0,0,.15);z-index:9999;opacity:0;transition:opacity .25s;pointer-events:none}
#toast.show{opacity:1}
.drop-zone{border:1.5px dashed var(--border2);border-radius:var(--radius-lg);padding:2rem;text-align:center;color:var(--text2);cursor:pointer;transition:border-color .15s,background .15s}
.drop-zone:hover,.drop-zone.over{border-color:var(--info-text);background:var(--info-bg)}
.drop-zone p{font-size:13px;margin-top:6px}
textarea.csv-input{width:100%;min-height:100px;padding:8px 10px;border:0.5px solid var(--border2);border-radius:var(--radius);background:var(--bg);color:var(--text);resize:vertical;font-family:monospace;font-size:12px;outline:none}
textarea.csv-input:focus{border-color:var(--info-text)}
.tag-group-header{background:var(--bg2);padding:6px 10px;font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.06em;color:var(--text2);border-bottom:0.5px solid var(--border);display:flex;align-items:center;gap:8px}
.step-num{width:24px;height:24px;border-radius:50%;background:var(--text);color:var(--bg);font-size:12px;font-weight:500;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.step-num.done{background:var(--success-text)}
.step-title{font-size:15px;font-weight:500}
.csv-table{width:100%;border-collapse:collapse;font-size:13px}
.csv-table th{text-align:left;padding:8px 10px;font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.06em;color:var(--text2);border-bottom:0.5px solid var(--border)}
.csv-table td{padding:8px 10px;border-bottom:0.5px solid var(--border);vertical-align:middle}
.csv-table tr:last-child td{border-bottom:none}

/* ── Sorter layout ── */
.sorter-layout{display:grid;grid-template-columns:280px 1fr;gap:16px;align-items:start}
.sorter-sidebar{display:flex;flex-direction:column;gap:10px;position:sticky;top:16px}
.sorter-categories{display:flex;flex-direction:column;gap:8px;max-height:calc(100vh - 240px);overflow-y:auto;padding-right:4px}
.cat-slot{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);min-height:64px;transition:border-color .15s,background .15s}
.cat-slot.drag-over{border-color:var(--info-text);background:var(--info-bg)}
.cat-slot-header{display:flex;align-items:center;gap:8px;padding:8px 10px;border-bottom:0.5px solid var(--border);cursor:pointer;user-select:none}
.cat-slot-header:hover{background:var(--bg2);border-radius:var(--radius-lg) var(--radius-lg) 0 0}
.cat-color-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.cat-slot-name{font-size:13px;font-weight:500;flex:1}
.cat-slot-count{font-size:11px;color:var(--text2)}
.cat-slot-movies{padding:6px;display:flex;flex-direction:column;gap:4px}
.cat-movie-item{display:flex;align-items:center;gap:8px;padding:4px 6px;border-radius:6px;background:var(--bg2);font-size:12px;cursor:default}
.cat-movie-item .rm-movie{margin-left:auto;cursor:pointer;color:var(--text3);font-size:11px;flex-shrink:0}
.cat-movie-item .rm-movie:hover{color:var(--danger-text)}
.sorter-main{display:flex;flex-direction:column;gap:12px}
.sorter-controls{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.movie-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px}
.movie-card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:10px;cursor:pointer;transition:border-color .15s,box-shadow .15s;position:relative;display:flex;flex-direction:column;gap:6px;user-select:none}
.movie-card:hover{border-color:var(--info-text);box-shadow:0 2px 8px rgba(0,0,0,.1)}
.movie-card.assigned{opacity:.45;pointer-events:none}
.movie-card.dragging{opacity:.35;transform:scale(.97)}
.movie-card-poster{width:100%;aspect-ratio:2/3;border-radius:6px;object-fit:cover;background:var(--bg2);display:block}
.movie-card-poster-ph{width:100%;aspect-ratio:2/3;border-radius:6px;background:var(--bg2);display:flex;align-items:center;justify-content:center;font-size:32px;color:var(--text3)}
.movie-card-title{font-size:12px;font-weight:500;line-height:1.3}
.movie-card-year{font-size:11px;color:var(--text2)}
.movie-card-tags{display:flex;flex-wrap:wrap;gap:3px}
.movie-card-assign-btn{position:absolute;top:6px;right:6px;background:var(--bg);border:0.5px solid var(--border2);border-radius:6px;width:24px;height:24px;display:flex;align-items:center;justify-content:center;font-size:13px;cursor:pointer;opacity:0;transition:opacity .15s}
.movie-card:hover .movie-card-assign-btn{opacity:1}
.cat-assign-dropdown{position:absolute;top:36px;right:6px;z-index:200;background:var(--bg);border:0.5px solid var(--border2);border-radius:var(--radius);box-shadow:0 4px 16px rgba(0,0,0,.2);min-width:160px;max-height:240px;overflow-y:auto}
.cat-assign-dropdown div{padding:7px 12px;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:8px}
.cat-assign-dropdown div:hover{background:var(--bg2)}
.sorter-unassigned-label{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.07em;color:var(--text2)}
.movie-list-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:0.5px solid var(--border);font-size:13px}
.movie-list-row:last-child{border-bottom:none}
.movie-list-row select{height:28px;font-size:12px;padding:0 6px;border:0.5px solid var(--border2);border-radius:var(--radius);background:var(--bg);color:var(--text);outline:none;flex-shrink:0;max-width:160px}
</style>
<!-- Standalone mode: copy config.example.js → config.js and fill in your values -->
<!-- Docker/server mode: config.js is not needed, /api/config is used instead -->
<script>window.__EMBY_CONFIG__=null;</script>
<script src="config.js" onerror="/* Docker/server mode - config.js not needed */"></script>
</head>
<body>
<div id="app"></div>
<div id="toast"></div>
<script>
// ════════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════════
const STORAGE_KEY='emby_tag_v3';
let S={
  nav:'sorter',
  config:{apiKey:'',userId:'',serverUrl:''},
  movies:[], tagHistory:[],
  page:'loading', error:null,
  pendingTags:{},
  logs:[], applying:false, applyProgress:0,
  stats:{applied:0,skipped:0,errors:0},
  filterText:'', subTab:'untagged',
  // Sorter
  sorter:{
    categories:[], // [{id,name,color}]
    assignments:{}, // movieId → catId
    filter:'unassigned', // 'all'|'unassigned'|'assigned'
    search:'',
    viewMode:'grid', // 'grid'|'list'
    dragMovieId:null,
    openDropdownId:null,
    phase:'sort', // 'sort'|'applying'|'done'
    progress:0,total:0,
    applyStats:{applied:0,skipped:0,errors:0},
    applyLogs:[],
    collapseMap:{}, // catId→bool
  },
  // CSV import
  imp:null,
};

const CAT_COLORS=['#4f8ef7','#e05c5c','#3baa6f','#e09a1e','#a855f7','#06b6d4','#f97316','#64748b','#ec4899','#10b981'];

function saveState(){
  try{
    localStorage.setItem(STORAGE_KEY,JSON.stringify({
      categories:S.sorter.categories,
      assignments:S.sorter.assignments,
      tagHistory:S.tagHistory,
    }));
  }catch(e){}
}
function loadState(){
  try{
    const d=JSON.parse(localStorage.getItem(STORAGE_KEY)||'{}');
    if(d.categories) S.sorter.categories=d.categories;
    if(d.assignments) S.sorter.assignments=d.assignments;
    if(d.tagHistory) S.tagHistory=d.tagHistory;
  }catch(e){}
}

// ════════════════════════════════════════════════
// HELPERS
// ════════════════════════════════════════════════
function toast(msg,ms=2800){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),ms);}
function hdrs(){return{'X-Emby-Token':S.config.apiKey,'Content-Type':'application/json'};}
// Standalone: calls Emby directly using full URL
// Docker/server: uses relative /emby/* path (proxied by Node)
function embyUrl(p){return S.config.serverUrl?S.config.serverUrl.replace(/\/+$/,'')+p.replace(/^\/emby/,''):p;}
function uid(){return Math.random().toString(36).slice(2);}
function addTagHistory(tag){tag=tag.trim();if(!tag)return;if(!S.tagHistory.includes(tag)){S.tagHistory.unshift(tag);if(S.tagHistory.length>300)S.tagHistory=S.tagHistory.slice(0,300);saveState();}}

function cleanTitle(raw){
  let s=raw;
  s=s.replace(/\s*\.(mkv|mp4|avi|m4v|mov|wmv|flv|ts)$/i,'');
  s=s.replace(/\s+(mkv|mp4|avi|m4v|mov|wmv|flv|ts)$/i,'');
  s=s.replace(/^\[\s*(?:www\.)?[A-Za-z0-9\-]+\.[a-z]{2,4}\s*\]\s*-?\s*/,'');
  s=s.replace(/^\[.*?\]\s*/,'');
  s=s.replace(/\./g,' ');
  s=s.replace(/[\[\(]?(19|20)\d{2}[\]\)]?.*/,'');
  s=s.replace(/\b(UNRATED|EXTENDED|THEATRICAL|DIRECTORS?\.?CUT|REMASTERED|REPACK|HC|LIMITED|INTERNAL|UNCENSORED|FRENCH|TRUEFRENCH|DVDRIP|BDRIP|BRRIP|WEBRIP|BLURAY|HDTV|HDRIP|XVID|H264|H265|HEVC|AAC|AC3|DTS|MULTI)\b.*/i,'');
  s=s.replace(/\[.*?\]/g,'').replace(/\{.*?\}/g,'');
  s=s.replace(/\([^)]*\b(Action|Adventure|BluRay|BRRip|WEBRip|HDRip|DVDRip|YTS|x264|x265|AAC|AC3|DTS|HDTV|Dual|Anime)\b[^)]*\)/gi,'');
  s=s.replace(/\s*-\s*[A-Za-z0-9][A-Za-z0-9\.\[\]]{1,25}$/,'');
  s=s.replace(/\.\s+\./g,' ').replace(/\s+\./g,' ').replace(/\.\s+/g,' ');
  s=s.replace(/_+/g,' ').replace(/\[\s*$/,'').replace(/\(\s*$/,'').replace(/\s*-\s*$/,'').replace(/\s*\.\s*$/,'');
  s=s.replace(/\s{2,}/g,' ').trim();
  return s.toLowerCase();
}
function normaliseEmby(name){return name.replace(/\s*\(\d{4}\)\s*$/,'').toLowerCase().trim();}
function bare(s){return s.replace(/[^a-z0-9]/g,'');}
function wordOverlap(a,b){const wa=a.split(/\s+/).filter(w=>w.length>1);const wb=new Set(b.split(/\s+/).filter(w=>w.length>1));if(!wa.length)return 0;return wa.filter(w=>wb.has(w)).length/wa.length;}
function findMovie(cleaned,lookup){
  if(lookup.has(cleaned))return lookup.get(cleaned);
  const noArt=cleaned.replace(/^(the|a|an) /,'');
  for(const[k,v]of lookup){if(k.replace(/^(the|a|an) /,'')===noArt)return v;}
  const cb=bare(cleaned);
  if(cb.length>=4){for(const[k,v]of lookup){if(bare(k)===cb)return v;}}
  if(cb.length>=6){for(const[k,v]of lookup){const eb=bare(k);if(eb.startsWith(cb)||cb.startsWith(eb))return v;}}
  const words=cleaned.split(/\s+/).filter(w=>w.length>1);
  if(words.length>=3){let best=null,bestScore=0;for(const[k,v]of lookup){const sc=wordOverlap(cleaned,k);if(sc>bestScore){bestScore=sc;best=v;}}if(bestScore>=0.80)return best;}
  return null;
}
function buildLookup(){const m=new Map();S.movies.forEach(mv=>{const k=normaliseEmby(mv.name);if(!m.has(k))m.set(k,mv);});return m;}

// ════════════════════════════════════════════════
// API
// ════════════════════════════════════════════════
async function init(){
  S.page='loading';render();
  try{
    let cfg;
    if(window.__EMBY_CONFIG__){
      // Standalone: credentials from config.js
      cfg=window.__EMBY_CONFIG__;
    } else {
      // Docker/server: credentials from /api/config proxy
      const r=await fetch('/api/config');
      if(!r.ok)throw new Error('Could not load config. In standalone mode, copy config.example.js to config.js and fill in your values.');
      cfg=await r.json();
    }
    S.config.apiKey=cfg.apiKey;
    S.config.userId=cfg.userId;
    S.config.serverUrl=cfg.serverUrl||'';
    await fetchMovies();
  }catch(e){S.error=e.message;S.page='error';render();}
}

async function fetchMovies(){
  S.page='loading';S.movies=[];render();
  try{
    const url=embyUrl(`/emby/Users/${S.config.userId}/Items?IncludeItemTypes=Movie&Recursive=true&Fields=Tags,TagItems,Path,ProductionYear&Limit=9999`);
    const r=await fetch(url,{headers:hdrs()});
    if(!r.ok)throw new Error(`Emby returned HTTP ${r.status}`);
    const d=await r.json();
    S.movies=(d.Items||[]).map(m=>({
      id:m.Id,name:m.Name,year:m.ProductionYear||'',
      path:m.Path||'',tags:(m.TagItems||[]).map(t=>t.Name),tagItems:m.TagItems||[]
    }));
    S.page='ready';
  }catch(e){S.error=e.message;S.page='error';}
  render();
}

async function applyTag(movieId,tag){
  const res=await applyTags(movieId,[tag]);
  if(res.added.includes(tag))return'ok';
  if(res.skipped.includes(tag))return'skipped';
  return res.error||'error:unknown';
}

async function removeTag(movieId,tag){
  try{
    const r=await fetch(embyUrl(`/emby/Users/${S.config.userId}/Items/${movieId}`),{headers:hdrs()});
    if(!r.ok)throw new Error(`Fetch HTTP ${r.status}`);
    const item=await r.json();
    const newTagItems=(item.TagItems||[]).filter(t=>t.Name!==tag);
    if(newTagItems.length===(item.TagItems||[]).length)return'skipped';
    const body=JSON.stringify({...item,TagItems:newTagItems});
    const pr=await fetch(embyUrl(`/emby/Items/${movieId}`),{method:'POST',headers:hdrs(),body});
    if(!pr.ok)throw new Error(`Save HTTP ${pr.status}`);
    return'ok';
  }catch(e){return'error:'+e.message;}
}

async function removeAllTags(movieId){
  try{
    const r=await fetch(embyUrl(`/emby/Users/${S.config.userId}/Items/${movieId}`),{headers:hdrs()});
    if(!r.ok)throw new Error(`Fetch HTTP ${r.status}`);
    const item=await r.json();
    if(!(item.TagItems||[]).length)return'skipped';
    const body=JSON.stringify({...item,TagItems:[]});
    const pr=await fetch(embyUrl(`/emby/Items/${movieId}`),{method:'POST',headers:hdrs(),body});
    if(!pr.ok)throw new Error(`Save HTTP ${pr.status}`);
    return'ok';
  }catch(e){return'error:'+e.message;}
}

async function applyTags(movieId,tags){
  try{
    const r=await fetch(embyUrl(`/emby/Users/${S.config.userId}/Items/${movieId}`),{headers:hdrs()});
    if(!r.ok)throw new Error(`Fetch HTTP ${r.status}`);
    const item=await r.json();
    const existing=new Set((item.TagItems||[]).map(t=>t.Name));
    const toAdd=tags.filter(t=>!existing.has(t));
    const skipped=tags.filter(t=>existing.has(t));
    if(!toAdd.length)return{added:[],skipped,error:null};
    const newTagItems=[...(item.TagItems||[]),...toAdd.map(t=>({Name:t,Id:0}))];
    const body=JSON.stringify({...item,TagItems:newTagItems});
    const pr=await fetch(embyUrl(`/emby/Items/${movieId}`),{method:'POST',headers:hdrs(),body});
    if(!pr.ok)throw new Error(`Save HTTP ${pr.status}`);
    return{added:toAdd,skipped,error:null};
  }catch(e){return{added:[],skipped:[],error:'error:'+e.message};}
}

function mk(tag,attrs={},...ch){
  const e=document.createElement(tag);
  for(const[k,v]of Object.entries(attrs)){
    if(k==='style'&&typeof v==='object')Object.assign(e.style,v);
    else if(k.startsWith('on'))e.addEventListener(k.slice(2).toLowerCase(),v);
    else e.setAttribute(k,v);
  }
  ch.flat().forEach(c=>e.appendChild(typeof c==='string'?document.createTextNode(c):c));
  return e;
}
function addLog(msg,type='info'){S.logs.unshift({msg,type,ts:new Date().toLocaleTimeString()});if(S.logs.length>500)S.logs=S.logs.slice(0,500);}

async function applySorterTags(){
  const assignments=S.sorter.assignments;
  const pairs=Object.entries(assignments); // [movieId, catId]
  if(!pairs.length){toast('No assignments to apply.');return;}
  S.sorter.phase='applying';
  S.sorter.progress=0;S.sorter.total=pairs.length;
  S.sorter.applyStats={applied:0,skipped:0,errors:0};S.sorter.applyLogs=[];
  render();
  for(let i=0;i<pairs.length;i++){
    const[movieId,catId]=pairs[i];
    const cat=S.sorter.categories.find(c=>c.id===catId);
    if(!cat){S.sorter.progress=i+1;continue;}
    const tag=cat.name;
    addTagHistory(tag);
    const res=await applyTag(movieId,tag);
    S.sorter.progress=i+1;
    const movie=S.movies.find(m=>m.id===movieId);
    if(res==='ok'){
      S.sorter.applyStats.applied++;
      S.sorter.applyLogs.unshift({msg:`+ "${tag}" → ${movie?.name||movieId}`,type:'ok',ts:new Date().toLocaleTimeString()});
      if(movie&&!movie.tags.includes(tag))movie.tags.push(tag);
    }else if(res==='skipped'){
      S.sorter.applyStats.skipped++;
      S.sorter.applyLogs.unshift({msg:`~ already set "${tag}": ${movie?.name||movieId}`,type:'skip',ts:new Date().toLocaleTimeString()});
    }else{
      S.sorter.applyStats.errors++;
      S.sorter.applyLogs.unshift({msg:`! ${movie?.name||movieId}: ${res.replace('error:','')}`,type:'err',ts:new Date().toLocaleTimeString()});
    }
    render();
    await new Promise(r=>setTimeout(r,60));
  }
  S.sorter.phase='done';render();
  toast(`Done — ${S.sorter.applyStats.applied} tags applied`);
}

function resetImp(){S.imp={mode:null,phase:'pick',rows:[],stats:{applied:0,skipped:0,errors:0},logs:[],progress:0,total:0,csvRaw:''};}

async function scanCsv(raw){
  S.imp.phase='scanning';render();
  // Format: MovieFolderName,Tag1,Tag2,Tag3,Tag4,Tag5
  // First column = movie, columns 2-6 = tags (empty columns ignored)
  // Skip header rows and blank lines
  const lines=raw.trim().split('\n').map(l=>l.trim()).filter(Boolean)
    .filter(l=>!/^movie/i.test(l.split(',')[0])&&l.includes(','));
  const lookup=buildLookup();
  const rows=[];
  const CHUNK=40;
  S.imp.total=lines.length;S.imp.progress=0;
  for(let i=0;i<lines.length;i++){
    const parts=lines[i].split(',').map(p=>p.trim()).filter(Boolean);
    if(parts.length>=2){
      const rawFolder=parts[0];
      const tags=[...new Set(parts.slice(1,6).filter(Boolean))]; // up to 5 tags, deduplicated
      const cleaned=cleanTitle(rawFolder);
      const matched=findMovie(cleaned,lookup);
      rows.push({rawFolder,cleanedTitle:cleaned,tags,matchedMovie:matched||null,keep:!!matched});
    }
    S.imp.progress=i+1;
    if((i+1)%CHUNK===0){render();await new Promise(r=>setTimeout(r,0));}
  }
  S.imp.rows=rows;
  S.imp.phase='confirm';render();
}

async function applyImpTags(){
  const toApply=S.imp.rows.filter(r=>r.keep&&r.matchedMovie&&r.tags.length);
  if(!toApply.length){toast('Nothing to apply.');return;}
  S.imp.phase='applying';S.imp.progress=0;S.imp.total=toApply.length;
  S.imp.stats={applied:0,skipped:0,errors:0};S.imp.logs=[];render();
  for(let i=0;i<toApply.length;i++){
    const row=toApply[i];
    row.tags.forEach(t=>addTagHistory(t));
    const res=await applyTags(row.matchedMovie.id,row.tags);
    S.imp.progress=i+1;
    if(res.error){
      S.imp.stats.errors++;
      S.imp.logs.unshift({msg:`! ${row.matchedMovie.name}: ${res.error.replace('error:','')}`,type:'err',ts:new Date().toLocaleTimeString()});
    } else {
      res.added.forEach(t=>{
        S.imp.stats.applied++;
        S.imp.logs.unshift({msg:`+ "${t}" → ${row.matchedMovie.name}`,type:'ok',ts:new Date().toLocaleTimeString()});
        if(!row.matchedMovie.tags.includes(t))row.matchedMovie.tags.push(t);
      });
      res.skipped.forEach(t=>{
        S.imp.stats.skipped++;
        S.imp.logs.unshift({msg:`~ already set "${t}": ${row.matchedMovie.name}`,type:'skip',ts:new Date().toLocaleTimeString()});
      });
    }
    render();
    await new Promise(r=>setTimeout(r,80));
  }
  S.imp.phase='done';render();
}

function generateBackupCsv(){
  // Import-compatible format: MovieName,Tag1,Tag2,Tag3...
  // One row per movie — can be fed directly back into the CSV Import tab
  const lines=['Movie,Tag1,Tag2,Tag3,Tag4,Tag5'];
  S.movies.forEach(m=>{
    if(!m.tags.length)return;
    const safeName=m.name.replace(/,/g,' ');
    lines.push([safeName,...m.tags.slice(0,5)].join(','));
  });
  return lines.join('\n');
}

function generateExportCsv(){
  // Export current Emby tags
  const lines=['Tag,Movie,Year,Path'];
  S.movies.forEach(m=>{
    if(!m.tags.length)return;
    m.tags.forEach(tag=>{
      const safeName=m.name.replace(/,/g,' ');
      lines.push(`${tag},${safeName},${m.year||''},${m.path||''}`);
    });
  });
  return lines.join('\n');
}

function generateSorterCsv(){
  // Export sorter assignments as category,movie CSV
  const lines=['Category,Movie,Year'];
  Object.entries(S.sorter.assignments).forEach(([movieId,catId])=>{
    const movie=S.movies.find(m=>m.id===movieId);
    const cat=S.sorter.categories.find(c=>c.id===catId);
    if(!movie||!cat)return;
    const safeName=movie.name.replace(/,/g,' ');
    lines.push(`${cat.name},${safeName},${movie.year||''}`);
  });
  return lines.join('\n');
}

function downloadCsv(content,filename){
  const blob=new Blob([content],{type:'text/csv'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=filename;
  document.body.appendChild(a);a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(a.href);
}

function filterMovies(){
  let list=S.movies;
  if(S.subTab==='untagged')list=list.filter(m=>m.tags.length===0);
  else if(S.subTab==='tagged')list=list.filter(m=>m.tags.length>0);
  if(S.filterText){const q=S.filterText.toLowerCase();list=list.filter(m=>m.name.toLowerCase().includes(q)||(m.year+'').includes(q));}
  return list;
}
function addPending(movieId,tag){
  tag=tag.trim();if(!tag)return;
  const movie=S.movies.find(m=>m.id===movieId);
  if(movie?.tags.includes(tag))return;
  if(!S.pendingTags[movieId])S.pendingTags[movieId]=[];
  if(!S.pendingTags[movieId].includes(tag))S.pendingTags[movieId].push(tag);
}
async function applyAllPending(){
  const entries=Object.entries(S.pendingTags).filter(([,tags])=>tags.length>0);
  if(!entries.length){toast('No pending tags.');return;}
  S.applying=true;S.applyProgress=0;S.stats={applied:0,skipped:0,errors:0};S.logs=[];
  render();
  const total=entries.reduce((s,[,tags])=>s+tags.length,0);
  let done=0;
  for(const[id,tags]of entries){
    const movie=S.movies.find(m=>m.id===id);
    for(const tag of tags){
      addTagHistory(tag);
      const res=await applyTag(id,tag);
      done++;S.applyProgress=Math.round((done/total)*100);
      if(res==='ok'){S.stats.applied++;addLog(`+ "${tag}" → ${movie?.name||id}`,'ok');if(movie&&!movie.tags.includes(tag))movie.tags.push(tag);}
      else if(res==='skipped'){S.stats.skipped++;addLog(`~ already tagged "${tag}": ${movie?.name||id}`,'skip');}
      else{S.stats.errors++;addLog(`! ${movie?.name||id}: ${res.replace('error:','')}`,'err');}
      render();await new Promise(r=>setTimeout(r,80));
    }
    delete S.pendingTags[id];
  }
  S.applying=false;render();
  toast(`Done — ${S.stats.applied} applied, ${S.stats.skipped} skipped, ${S.stats.errors} errors`);
}

  const list=filterMovies();
  if(!list.length){w.appendChild(mk('div',{class:'empty-state'},S.subTab==='untagged'?'All movies are tagged! 🎉':'No movies match.'));return w;}
  const card=mk('div',{class:'card'});
  list.forEach(m=>card.appendChild(renderMovieRow(m)));
  w.appendChild(card);
  return w;
}

function renderMovieRow(movie){
  const row=mk('div',{class:'movie-row'});
  const thumbWrap=mk('div',{});
  const img=mk('img',{src:embyUrl(`/emby/Items/${movie.id}/Images/Primary?maxHeight=120&quality=70&api_key=${S.config.apiKey}`),class:'thumb',alt:''});
  const ph=mk('div',{class:'thumb-placeholder'},'🎬');
  img.onerror=()=>{thumbWrap.innerHTML='';thumbWrap.appendChild(ph);};
  thumbWrap.appendChild(img);row.appendChild(thumbWrap);
  const left=mk('div');
  const nameRow=mk('div',{class:'row',style:{flexWrap:'wrap',gap:'6px',marginBottom:'4px'}});
  nameRow.appendChild(mk('span',{style:{fontWeight:'500',fontSize:'14px'}},movie.name));
  if(movie.year)nameRow.appendChild(mk('span',{style:{fontSize:'12px',color:'var(--text2)'}},`(${movie.year})`));
  left.appendChild(nameRow);
  const currentTags=mk('div',{style:{display:'flex',flexWrap:'wrap',gap:'4px',marginBottom:'6px'}});
  if(movie.tags.length>0){
    movie.tags.forEach(t=>{
      const chip=mk('span',{class:'tag-chip'});
      chip.appendChild(document.createTextNode(t));
      const rm=mk('span',{class:'rm',title:'Remove this tag'},' ×');
      rm.onclick=async()=>{
        rm.textContent=' …';rm.style.pointerEvents='none';
        const res=await removeTag(movie.id,t);
        if(res==='ok'){movie.tags=movie.tags.filter(x=>x!==t);render();toast(`Removed "${t}" from ${movie.name}`);}
        else{rm.textContent=' ×';rm.style.pointerEvents='';toast('Error: '+res);}
      };
      chip.appendChild(rm);
      currentTags.appendChild(chip);
    });
  } else currentTags.appendChild(mk('span',{style:{fontSize:'12px',color:'var(--text3)'}},'No tags'));
  left.appendChild(currentTags);
  const pending=S.pendingTags[movie.id]||[];
  if(pending.length>0){
    const pr=mk('div',{style:{display:'flex',flexWrap:'wrap',gap:'4px',marginBottom:'6px'}});
    pending.forEach((t,i)=>{
      const chip=mk('span',{class:'tag-chip pending'});
      const rm=mk('span',{class:'rm'},' ×');
      rm.onclick=()=>{S.pendingTags[movie.id].splice(i,1);if(!S.pendingTags[movie.id].length)delete S.pendingTags[movie.id];render();};
      chip.appendChild(document.createTextNode('+ '+t));chip.appendChild(rm);pr.appendChild(chip);
    });
    left.appendChild(pr);
  }
  const inputWrap=mk('div',{class:'suggest-wrap row'});
  const inp=mk('input',{type:'text',placeholder:'Add tag…',style:{maxWidth:'200px',width:'200px'}});
  const sug=mk('div',{class:'tag-suggest',style:{display:'none'}});
  let st=null;
  function showSuggestions(){
    const q=inp.value.toLowerCase().trim();
    const matches=S.tagHistory.filter(t=>(q?t.toLowerCase().includes(q):true)&&!(S.pendingTags[movie.id]||[]).includes(t)&&!movie.tags.includes(t));
    sug.innerHTML='';
    if(!matches.length){sug.style.display='none';return;}
    matches.slice(0,10).forEach(t=>{const d=mk('div',{},t);d.onmousedown=e=>{e.preventDefault();addPending(movie.id,t);inp.value='';sug.style.display='none';render();};sug.appendChild(d);});
    sug.style.display='block';
  }
  inp.addEventListener('input',()=>{clearTimeout(st);st=setTimeout(showSuggestions,80);});
  inp.addEventListener('focus',showSuggestions);
  inp.addEventListener('blur',()=>setTimeout(()=>sug.style.display='none',150));
  inp.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();addPending(movie.id,inp.value);inp.value='';sug.style.display='none';render();}});
  const btnAdd=mk('button',{},'Add');
  btnAdd.onclick=()=>{addPending(movie.id,inp.value);inp.value='';sug.style.display='none';render();};
  inputWrap.appendChild(inp);inputWrap.appendChild(sug);inputWrap.appendChild(btnAdd);
  left.appendChild(inputWrap);row.appendChild(left);
  const right=mk('div',{style:{paddingTop:'2px'}});
  if(pending.length>0){
    const btnNow=mk('button',{class:'success',style:{height:'28px',fontSize:'12px',padding:'0 10px'}},'Apply now');
    btnNow.onclick=async()=>{
      for(const tag of[...pending]){addTagHistory(tag);const res=await applyTag(movie.id,tag);if(res==='ok'&&!movie.tags.includes(tag))movie.tags.push(tag);}
      delete S.pendingTags[movie.id];render();toast(`Tagged: ${movie.name}`);
    };
    right.appendChild(btnNow);
  }
  row.appendChild(right);
  return row;
}

// ════════════════════════════════════════════════
// BOOT
// ════════════════════════════════════════════════
loadState();
init();
</script>
