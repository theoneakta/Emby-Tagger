name: Deploy to Server

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and restart
        run: |
          cp /home/mbmondor/docker/emby-tagger/.env .env
          docker compose up --build -d
          docker image prune -f
