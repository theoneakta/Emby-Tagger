services:
  emby-tag-manager:
    build: .
    container_name: emby-tag-manager
    restart: unless-stopped
    ports:
      - "8765:3000"        # Left side = host port (change to any free port)
    env_file:
      - .env               # Copy .env.example → .env and fill in your values
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/config"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
